name: Deploy (Hugging Face data + Cloudflare landing)

# Single workflow, two publish targets per push to main/stage (ADR-0005):
#   - Hugging Face dataset `sumpalabs/petrodb` carries the parquet *bytes*
#     (`*.parquet` + `_files.json`) on a branch matching the GitHub ref. HF
#     `resolve` URLs honour HTTP Range unconditionally, so DuckDB `httpfs`
#     consumers get true row-group pushdown (Cloudflare Pages does not).
#   - Cloudflare Pages carries the landing + schema docs (and, for now, still
#     the parquet — removing it there is the next migration slice).
#
# Branch → environment mapping is shared by both targets:
#   - push to `main`   → HF `main` revision + wrangler --branch main   → production (petrodb.ocortez.com)
#   - push to `stage`  → HF `stage` branch  + wrangler --branch stage  → preview deployment
#
# Trigger: any push to main/stage that touches deployable content — committed
# datasets under `parquet/`, the 3W pipeline sources (whose outputs are
# gitignored and rebuilt in CI), or this workflow file. `workflow_dispatch`
# allows manual redeploys without an empty commit.
#
# 3W pipeline re-run is gated by a cache keyed on the 3W source hashes plus
# the resolved per-branch BASE_URL (so the prod/stage catalogs never share a
# cache entry): if neither has changed, the previously-generated 3W tree is
# restored and the deploy goes out without re-running the pipeline.

on:
  push:
    branches: [main, stage]
    paths:
      - 'parquet/**'
      - 'scripts/transform/petrobras_3w/**'
      - 'scripts/export/petrobras_3w/**'
      - 'scripts/run_pipeline/petrobras_3w/**'
      - '.github/workflows/deploy-cloudflare-pages.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-cloudflare-pages-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref_name == 'main' || github.ref_name == 'stage'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Baked into `instances.parquet#source_url` so consumers can round-trip
      # the catalog to Observations URLs. Per-branch because the two HF
      # revisions (`/resolve/main/` vs `/resolve/stage/`) are distinct URL
      # bases; the catalog must reference the host+revision where its own
      # bytes are reachable. Points at the HF resolve bases (ADR-0005).
      BASE_URL: ${{ github.ref_name == 'main' && vars.BASE_URL_MAIN || vars.BASE_URL_STAGE }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore Petrobras 3W generated tree (if sources unchanged)
        id: cache-3w
        uses: actions/cache@v4
        with:
          path: parquet/petrobras_3w
          key: >-
            petrobras-3w-${{ hashFiles(
              'scripts/transform/petrobras_3w/**',
              'scripts/export/petrobras_3w/**',
              'scripts/run_pipeline/petrobras_3w/**'
            ) }}-${{ env.BASE_URL }}

      - name: Install uv
        if: steps.cache-3w.outputs.cache-hit != 'true'
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        if: steps.cache-3w.outputs.cache-hit != 'true'
        run: uv python install 3.12

      - name: Install dependencies
        if: steps.cache-3w.outputs.cache-hit != 'true'
        run: uv sync --frozen

      - name: Build Petrobras 3W parquet tree
        if: steps.cache-3w.outputs.cache-hit != 'true'
        run: uv run python -m scripts.run_pipeline.petrobras_3w

      # --- Hugging Face: publish the parquet bytes (ADR-0005) -----------------
      # Runs regardless of the 3W cache outcome — on a cache hit the generated
      # tree is restored, so `parquet/` is fully populated either way. The
      # huggingface_hub CLI (`hf`) installs independently of the uv steps,
      # which are gated on the cache miss. hf_xet enables the fast Xet upload
      # backend HF uses for content-addressed storage.
      - name: Install Hugging Face CLI
        run: pipx install "huggingface_hub[cli,hf_xet]"

      - name: Authenticate Hugging Face CLI
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: hf auth login --token "$HF_TOKEN"

      # `main` exists by default; ensure the `stage` branch is present before
      # uploading to it. `--exist-ok` makes the step idempotent across reruns.
      - name: Ensure HF stage branch exists
        if: github.ref_name == 'stage'
        run: >-
          hf repo branch create sumpalabs/petrodb stage
          --repo-type dataset
          --revision main
          --exist-ok

      # Single-commit upload of the parquet bytes only (`*.parquet` +
      # `_files.json`); the landing/docs/svg stay Cloudflare-only. `--delete`
      # prunes files no longer produced by the build so the HF branch stays in
      # sync with the tree. Single commit (not upload-large-folder) because only
      # `hf upload` supports the `--delete` sync semantics.
      - name: Upload parquet bytes to Hugging Face
        run: >-
          hf upload sumpalabs/petrodb parquet .
          --repo-type dataset
          --revision ${{ github.ref_name }}
          --include '**/*.parquet'
          --include '**/_files.json'
          --delete '**/*.parquet'
          --delete '**/_files.json'
          --commit-message "CI deploy: parquet tree from ${{ github.sha }}"

      # HF requires a dataset card to host a dataset. The card is the committed
      # source of truth at hf/README.md (kept outside parquet/ so it stays out
      # of the Cloudflare `pages deploy parquet/` tree); upload it to the repo
      # root README.md.
      - name: Upload Hugging Face dataset card
        run: >-
          hf upload sumpalabs/petrodb hf/README.md README.md
          --repo-type dataset
          --revision ${{ github.ref_name }}
          --commit-message "CI deploy: dataset card from ${{ github.sha }}"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: >-
            pages deploy parquet/
            --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }}
            --branch=${{ github.ref_name }}
